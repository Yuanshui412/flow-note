# ═══════════════════════════════════════════
# FlowNote — Kubernetes 部署清单
# 部署: kubectl apply -f k8s/manifests.yaml
# ═══════════════════════════════════════════

# ─── Namespace ───
apiVersion: v1
kind: Namespace
metadata:
  name: flownote
---
# ─── ConfigMap（非敏感配置）───
apiVersion: v1
kind: ConfigMap
metadata:
  name: flownote-config
  namespace: flownote
data:
  NODE_ENV: "production"
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  AI_MODEL_FAST: "gpt-4o-mini"
  AI_MODEL_SMART: "gpt-4o"
  NEXTAUTH_URL: "https://flownote.example.com"
---
# ─── Secrets（敏感配置）───
apiVersion: v1
kind: Secret
metadata:
  name: flownote-secrets
  namespace: flownote
type: Opaque
stringData:
  DATABASE_URL: "postgresql://flownote:REPLACE_ME@postgres-svc:5432/flownote"
  OPENAI_API_KEY: "sk-REPLACE_ME"
  NEXTAUTH_SECRET: "REPLACE_ME_64_CHAR_RANDOM"
---
# ─── PostgreSQL ───
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: flownote
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: flownote
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: "flownote"
            - name: POSTGRES_PASSWORD
              value: "flownote_prod"
            - name: POSTGRES_DB
              value: "flownote"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "flownote", "-d", "flownote"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
# ─── FlowNote App Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flownote-app
  namespace: flownote
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # 滚动更新时始终有 2 个 Pod 在线
      maxSurge: 1          # 更新时允许临时多 1 个 Pod
  selector:
    matchLabels:
      app: flownote-app
  template:
    metadata:
      labels:
        app: flownote-app
    spec:
      containers:
        - name: app
          image: flownote:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: flownote-config
            - secretRef:
                name: flownote-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          # 存活探针：Pod 是否还活着（失败 → 重启容器）
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          # 就绪探针：Pod 能否接流量（失败 → 移出 Service）
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ─── App Service（集群内负载均衡）───
apiVersion: v1
kind: Service
metadata:
  name: flownote-svc
  namespace: flownote
spec:
  selector:
    app: flownote-app
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
# ─── HPA（水平自动扩缩）───
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flownote-hpa
  namespace: flownote
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flownote-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
