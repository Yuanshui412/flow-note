# ═══════════════════════════════════════════
# FlowNote — 一键部署（Next.js + PostgreSQL）
# ═══════════════════════════════════════════

services:
  # ─── PostgreSQL 16 ───
  postgres:
    image: postgres:16-alpine
    container_name: flownote-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flownote
      POSTGRES_PASSWORD: flownote_dev
      POSTGRES_DB: flownote
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flownote -d flownote"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FlowNote App ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flownote-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://flownote:flownote_dev@postgres:5432/flownote
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL_FAST: ${AI_MODEL_FAST:-gpt-4o-mini}
      AI_MODEL_SMART: ${AI_MODEL_SMART:-gpt-4o}
      AI_MODEL_STRUCTURED: ${AI_MODEL_STRUCTURED:-gpt-4o-mini}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-production-secret-change-me}
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    # 启动后自动执行数据库迁移
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node server.js
      "

volumes:
  pgdata:
